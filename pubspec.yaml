name: ecommerce_app
description: A Flutter e-commerce mobile application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP requests
  http: ^1.1.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Image handling
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  path: ^1.8.3
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # UI Components
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.19.0
  
  # URL launcher for opening external links
  url_launcher: ^6.2.1
  
  # JWT handling
  dart_jsonwebtoken: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
